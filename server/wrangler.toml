name = "regulate-to-learn-api"
main = "src/worker.js"
compatibility_date = "2026-04-12"

# D1 database binding available in both dev and production
[[d1_databases]]
binding = "REGULATE_DB"
database_name = "regulate_to_learn"
database_id = "8a23f58c-3416-49fb-bb1f-51a106f3ace9"
migrations_dir = "migrations"

[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGIN = "http://localhost:5173"

# Use separate Cloudflare environments for dev/staging/prod.
[env.production]
name = "regulate-to-learn-api-prod"
